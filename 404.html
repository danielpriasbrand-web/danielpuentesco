<style>
  :root{--white:#FAFAFA;--off:#F2F2F0;--ink:#0C0C0B;--ink-mid:#555550;--ink-low:#A0A09A;--border:#E4E4E0;--neon:#C8F000;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--ink);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-top:62px;text-align:center;padding:40px 24px;}

  h1{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(22px,4vw,36px);font-weight:800;letter-spacing:-1px;margin-bottom:14px;}
  p{color:rgba(255,255,255,0.5);font-size:16px;font-weight:300;line-height:1.7;max-width:420px;margin:0 auto 40px;}
  .actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}

  .btn-ghost{background:transparent;color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.15);font-size:14px;padding:14px 28px;border-radius:8px;text-decoration:none;transition:all .2s;}

    /* Hero actions */
    .hero-actions { flex-direction: column !important; gap: 10px !important; }
    .hero-actions a { width: 100%; text-align: center; justify-content: center; }

    /* Buttons */
    .btn-dark, .btn-outline { width: 100%; justify-content: center; text-align: center; }

    /* Contact form */

    /* Blog grid */

    .featured-card { grid-template-columns: 1fr !important; }

    /* Approach grid */
    .approach-grid { grid-template-columns: 1fr !important; }

    /* Timeline */
    .tl-item { padding-left: 20px !important; }

    /* Tables — horizontal scroll */
    table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }

    /* CTA section */
    .cta-actions { flex-direction: column !important; gap: 10px !important; }
    .cta-actions a { width: 100%; text-align: center; justify-content: center; }

    /* Allies carousel */
    .allies-header { flex-direction: column !important; gap: 8px !important; padding: 0 24px !important; }

    /* Events tabs */
    .events-tabs { overflow-x: auto; }
    .events-tab { white-space: nowrap; }

    /* Program cards in capacitaciones */
    .programs-grid { grid-template-columns: 1fr !important; }

    /* Sobre-mi sidebar */
    .sm-grid { grid-template-columns: 1fr !important; }
    .sm-sidebar { position: static !important; top: auto !important; }

    /* Article layout */
    .article-wrap { grid-template-columns: 1fr !important; padding: 90px 20px 60px !important; }
    .article-sidebar { display: none; }

    /* Inline price cards */
    .price-card-row { flex-direction: column !important; }

    /* WhatsApp button */
    .wa-float { bottom: 16px !important; right: 16px !important; }
    .wa-btn { width: 48px !important; height: 48px !important; }
  }


  @media(max-width:600px) {
    .pricing-grid-3, .pricing-grid-2 { grid-template-columns: 1fr !important; }
    /* Sobre-mi ARIA grid */
    div[style*="grid-template-columns:1fr 1fr"][style*="gap:12px"] { grid-template-columns: 1fr !important; }

    /* Hide hero right side photo on mobile */
    .hero-right { display: none !important; }

    .program-card { margin-bottom: 16px; }
